name: Public Surface Guard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Ежедневно в 06:00 UTC
    - cron: '0 6 * * *'

jobs:
  guard:
    name: Run PublicSurfaceGuard v1.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy guard script to VPS
        run: |
          scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=no \
            scripts/surface_guard.py \
            root@${{ secrets.VPS_HOST }}:/tmp/surface_guard.py

      - name: Run guard on VPS and capture JSON output
        run: |
          mkdir -p artifacts
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} \
            "docker cp /tmp/surface_guard.py billing-portal:/opt/surface_guard.py && \
             docker exec billing-portal python3 /opt/surface_guard.py" \
            > artifacts/guard_result.json 2>&1
          echo "--- Guard output ---"
          cat artifacts/guard_result.json

      - name: Upload JSON as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surface-guard-result
          path: artifacts/guard_result.json
          retention-days: 30

      - name: Check verdict — fail if FAIL
        run: |
          VERDICT=$(python3 -c "import sys,json; print(json.load(open('artifacts/guard_result.json'))['verdict'])" 2>/dev/null || echo 'PARSE_ERROR')
          echo "Verdict: $VERDICT"
          if [ "$VERDICT" != "PASS" ]; then
            echo "::error::PublicSurfaceGuard FAILED — verdict=$VERDICT"
            cat artifacts/guard_result.json
            exit 1
          fi
          echo "PublicSurfaceGuard PASSED — surface is clean."
