name: Public Surface Guard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Ежедневно в 06:00 UTC
    - cron: '0 6 * * *'

jobs:
  guard:
    name: Run PublicSurfaceGuard v1.0
    # Self-hosted runner на VPS — прямой доступ к Docker и billing-portal
    runs-on: [self-hosted, vps]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run guard inside billing-portal container
        run: |
          docker cp scripts/surface_guard.py billing-portal:/opt/surface_guard.py
          mkdir -p artifacts
          docker exec billing-portal python3 /opt/surface_guard.py > artifacts/guard_result.json 2>&1
          echo "--- Guard output ---"
          cat artifacts/guard_result.json

      - name: Upload JSON as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surface-guard-result
          path: artifacts/guard_result.json
          retention-days: 30

      - name: Check verdict — fail if FAIL
        run: |
          VERDICT=$(python3 -c "import sys,json; print(json.load(open('artifacts/guard_result.json'))['verdict'])" 2>/dev/null || echo 'PARSE_ERROR')
          echo "Verdict: $VERDICT"
          if [ "$VERDICT" != "PASS" ]; then
            echo "::error::PublicSurfaceGuard FAILED — verdict=$VERDICT"
            cat artifacts/guard_result.json
            exit 1
          fi
          echo "PublicSurfaceGuard PASSED — surface is clean."
